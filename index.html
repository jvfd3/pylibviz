<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PyLibViz - Python Compatibility Timeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2024.1.1/core.css"
    />
    <script
      type="module"
      src="https://pyscript.net/releases/2024.1.1/core.js"
    ></script>
  </head>
  <body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <main class="layout">
      <header class="hero">
        <p class="eyebrow">dependency compatibility</p>
        <h1>PyLibViz</h1>
        <p class="subtitle">
          Paste your requirements.txt and view, in a timeline, how package
          versions align with Python versions and compatibility constraints.
        </p>
      </header>

      <section class="panel input-panel">
        <label for="requirements-input">requirements.txt (text)</label>
        <textarea
          id="requirements-input"
          placeholder="Example:
requests==2.31.0
pandas>=2.0,<3
fastapi"
        ></textarea>

        <fieldset class="python-select" id="python-select">
          <legend>Python versions to compare</legend>
        </fieldset>

        <div class="actions">
          <button id="analyze-btn" type="button">Analyze compatibility</button>
          <span id="status" aria-live="polite"></span>
        </div>
      </section>

      <section class="panel" id="results-panel">
        <h2>Timeline by package</h2>
        <div id="results" class="results"></div>
      </section>
    </main>

    <py-script src="app.py" config="pyscript.toml"></py-script>
    <script src="app.js" defer></script>
  </body>
</html>
